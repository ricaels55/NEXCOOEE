<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NexCooee | Sistema de Dados</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      font-family: 'Inter', 'JetBrains Mono', monospace;
      color: #ccf5ff;
      overflow-x: hidden;
    }
    .hacker-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35;
      overflow: hidden;
    }
    .rain {
      position: absolute;
      top: -20%;
      left: 0;
      width: 100%;
      height: 120%;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: #0f8;
      white-space: pre;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-30vh); opacity: 0.2; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
    .app-container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }
    .glass-card {
      background: rgba(10, 20, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 2rem;
      padding: 1.8rem;
    }
    .glitch-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a5f0d6, #1effbc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .input-field {
      background: #0b141ab3;
      border: 1px solid #2c5a4a;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #d0f0ff;
      outline: none;
      width: 100%;
    }
    .input-field:focus {
      border-color: #1effbc;
      box-shadow: 0 0 12px #1effbc40;
    }
    .btn {
      background: linear-gradient(95deg, #0c2b24, #05100e);
      border: 1px solid #2affb6;
      border-radius: 2.5rem;
      padding: 0.8rem 1.8rem;
      font-weight: 600;
      font-family: 'Inter', monospace;
      color: #ccfff0;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      background: #0f392e;
      box-shadow: 0 0 8px #2effb3;
      transform: scale(0.97);
    }
    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px dashed #2eaa8a;
      padding-bottom: 8px;
    }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .data-card {
      background: rgba(8, 18, 22, 0.8);
      border-radius: 1.5rem;
      border: 1px solid rgba(0, 255, 170, 0.3);
      padding: 1.2rem;
      transition: 0.2s;
      position: relative;
    }
    .data-card:hover {
      border-color: #1effbc;
      transform: translateY(-3px);
    }
    .card-name {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(120deg, #baf8e6, #74ffce);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .info-row {
      display: flex;
      gap: 8px;
      margin: 8px 0;
      font-size: 0.85rem;
      align-items: center;
      font-family: monospace;
    }
    .info-row i { width: 24px; color: #2affbc; }
    .badge {
      background: #102b24;
      border-radius: 28px;
      padding: 2px 10px;
      font-size: 0.7rem;
      width: fit-content;
      margin-top: 12px;
      border-left: 2px solid #1effbc;
    }
    .delete-icon {
      position: absolute;
      bottom: 12px;
      right: 16px;
      color: #ff6e7f;
      opacity: 0.6;
      cursor: pointer;
      font-size: 1rem;
    }
    .delete-icon:hover {
      opacity: 1;
      color: #ff3860;
    }
    .empty-msg {
      text-align: center;
      padding: 3rem;
      background: #0712156b;
      border-radius: 2rem;
      border: 1px dashed #1effbc;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.7rem;
      opacity: 0.6;
    }
    .backup-bar {
      display: flex;
      gap: 12px;
      margin: 1rem 0;
      flex-wrap: wrap;
    }
    .record-counter {
      background: #0b191f80;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-family: monospace;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 640px) {
      .glitch-title { font-size: 1.8rem; }
      .app-container { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="hacker-bg" id="matrixBg"></div>

<div class="app-container">
  <div class="flex-between">
    <div>
      <div class="glitch-title">>_NEXCOOEE</div>
      <div style="border-left: 3px solid #1effbc; padding-left: 1rem; font-size: 0.9rem;">// cooee club • data nexus</div>
    </div>
    <div class="record-counter"><i class="fas fa-database"></i> <span id="recordCount">0</span> registros</div>
  </div>

  <!-- BACKUP BAR -->
  <div class="backup-bar">
    <button id="backupBtn" class="btn"><i class="fas fa-download"></i> 💾 Backup</button>
    <button id="restoreBtn" class="btn"><i class="fas fa-upload"></i> 📂 Restaurar</button>
  </div>

  <!-- ADD PERSON -->
  <div class="glass-card">
    <div class="section-title">
      <i class="fas fa-user-secret"></i> <span>INJECT NEW TARGET</span>
    </div>
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
      <input type="text" id="fullName" class="input-field" style="flex:1;" placeholder="Nome completo" autocomplete="off">
      <input type="text" id="personEmail" class="input-field" style="flex:1;" placeholder="E-mail" autocomplete="off">
      <input type="text" id="personPhone" class="input-field" style="flex:1;" placeholder="Telefone" autocomplete="off">
      <input type="text" id="personLocation" class="input-field" style="flex:1;" placeholder="Cidade/País" autocomplete="off">
      <button id="addBtn" class="btn"><i class="fas fa-skull-crosswalk"></i> INJECT</button>
    </div>
    <div class="status-message" id="addStatus" style="font-size: 0.8rem; margin-top: 1rem; color: #8bcb9e;"></div>
  </div>

  <!-- SEARCH -->
  <div style="margin: 1.5rem 0; display: flex; gap: 1rem; flex-wrap: wrap;">
    <input type="text" id="searchInput" class="input-field" style="flex:2;" placeholder="🔍 Buscar por nome, email ou local...">
    <button id="clearSearchBtn" class="btn"><i class="fas fa-times"></i> Limpar</button>
  </div>

  <!-- CARDS GRID -->
  <div id="peopleGrid" class="data-grid">
    <div class="empty-msg"><i class="fas fa-ghost"></i> Nenhum registro encontrado.<br>Adicione dados acima.</div>
  </div>
  <footer><i class="fas fa-terminal"></i> [ NexCooee • Dados persistentes • Backup incluso ]</footer>
</div>

<script>
// Sistema completo - SEM LOGIN
let peopleDatabase = [];
let currentSearchTerm = '';

// FUNDO HACKER RAIN
function initHackerRain() {
  const bg = document.getElementById('matrixBg');
  if (!bg) return;
  bg.innerHTML = '';
  const chars = '01アイウエオカキクケコサシスソタチツテト';
  for (let i = 0; i < 60; i++) {
    const rain = document.createElement('div');
    rain.className = 'rain';
    let txt = '';
    for (let j = 0; j < 20; j++) txt += chars[Math.floor(Math.random() * chars.length)];
    rain.textContent = txt;
    rain.style.left = Math.random() * 100 + '%';
    rain.style.fontSize = (Math.random() * 18 + 10) + 'px';
    rain.style.animationDuration = (Math.random() * 4 + 2) + 's';
    rain.style.animationDelay = Math.random() * 10 + 's';
    rain.style.opacity = Math.random() * 0.4 + 0.1;
    bg.appendChild(rain);
  }
}
initHackerRain();

setInterval(() => {
  const bg = document.getElementById('matrixBg');
  if (bg && bg.children.length) {
    for (let i = 0; i < 5; i++) {
      const r = bg.children[Math.floor(Math.random() * bg.children.length)];
      if (r) {
        const chars = '01アイウエオカキクケコサシスソ';
        let newTxt = '';
        for (let j = 0; j < r.textContent.length; j++) newTxt += chars[Math.floor(Math.random() * chars.length)];
        r.textContent = newTxt;
      }
    }
  }
}, 2000);

// DADOS
function persistData() {
  localStorage.setItem('nexcooee_data', JSON.stringify(peopleDatabase));
  updateRecordCount();
}

function loadFromStorage() {
  const stored = localStorage.getItem('nexcooee_data');
  if (stored) {
    try {
      peopleDatabase = JSON.parse(stored);
      if (!Array.isArray(peopleDatabase)) peopleDatabase = [];
    } catch(e) { peopleDatabase = []; }
  } else {
    peopleDatabase = [];
  }
  renderPeopleList();
}

function updateRecordCount() {
  const span = document.getElementById('recordCount');
  if (span) span.innerText = peopleDatabase.length;
}

function generateId() {
  return 'id_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
}

function addPerson(name, email, phone, location) {
  if (!name.trim()) {
    showStatus('⚠️ Nome é obrigatório!', 'error');
    return false;
  }
  const newPerson = {
    id: generateId(),
    name: name.trim(),
    email: email.trim(),
    phone: phone.trim(),
    location: location.trim() || 'Desconhecido',
    createdAt: Date.now()
  };
  peopleDatabase.unshift(newPerson);
  persistData();
  renderPeopleList();
  showStatus(`✔️ ${newPerson.name} adicionado!`, 'success');
  return true;
}

function deletePersonById(id) {
  const person = peopleDatabase.find(p => p.id === id);
  if (person && confirm(`Remover ${person.name} permanentemente?`)) {
    peopleDatabase = peopleDatabase.filter(p => p.id !== id);
    persistData();
    renderPeopleList();
    showStatus(`🗑️ Registro de ${person.name} foi eliminado.`, 'info');
  }
}

function getFilteredPeople() {
  if (!currentSearchTerm.trim()) return [...peopleDatabase];
  const term = currentSearchTerm.trim().toLowerCase();
  return peopleDatabase.filter(p => 
    p.name.toLowerCase().includes(term) ||
    p.email.toLowerCase().includes(term) ||
    p.location.toLowerCase().includes(term) ||
    p.phone.includes(term)
  );
}

function highlightText(text) {
  if (!currentSearchTerm.trim() || !text) return text || '';
  const term = currentSearchTerm.toLowerCase();
  const lowerText = text.toLowerCase();
  if (!lowerText.includes(term)) return text;
  const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span style="background:#1effbc30; padding:0 2px; border-radius:6px;">$1</span>');
}

function renderPeopleList() {
  const grid = document.getElementById('peopleGrid');
  if (!grid) return;
  const filtered = getFilteredPeople();
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-msg"><i class="fas fa-user-slash"></i> Nenhum alvo corresponde à busca.<br>Adicione novos registros ou limpe o filtro.</div>`;
    updateRecordCount();
    return;
  }
  const cardsHtml = filtered.map(person => `
    <div class="data-card" data-id="${person.id}">
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span class="card-name">${highlightText(person.name)}</span>
        <span class="badge" style="font-size:0.65rem;">${person.id.slice(-6)}</span>
      </div>
      <div class="info-row"><i class="fas fa-envelope"></i> ${highlightText(person.email) || '—'}</div>
      <div class="info-row"><i class="fas fa-phone-alt"></i> ${highlightText(person.phone) || '—'}</div>
      <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${highlightText(person.location) || '—'}</div>
      <div class="badge"><i class="fas fa-clock"></i> ${new Date(person.createdAt).toLocaleString()}</div>
      <div class="delete-icon" data-delete="${person.id}"><i class="fas fa-trash-alt"></i></div>
    </div>
  `).join('');
  grid.innerHTML = cardsHtml;
  updateRecordCount();
  document.querySelectorAll('.delete-icon').forEach(icon => {
    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = icon.getAttribute('data-delete');
      if (id) deletePersonById(id);
    });
  });
  document.querySelectorAll('.data-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.delete-icon')) return;
      const id = card.getAttribute('data-id');
      const person = peopleDatabase.find(p => p.id === id);
      if (person) {
        alert(`🔎 DETALHES DO PERFIL\n\n🆔 ${person.name}\n📧 E-mail: ${person.email || 'não informado'}\n📞 Telefone: ${person.phone || 'não informado'}\n📍 Localização: ${person.location}\n🕒 Criado em: ${new Date(person.createdAt).toLocaleString()}`);
      }
    });
  });
}

function showStatus(message, type = 'info') {
  const el = document.getElementById('addStatus');
  if (!el) return;
  el.innerText = message;
  el.style.color = type === 'error' ? '#ffa098' : type === 'success' ? '#a3ffcf' : '#c7f0e0';
  setTimeout(() => {
    if (el.innerText === message) el.innerText = '';
  }, 3000);
}

// BACKUP
function fazerBackup() {
  const dados = { pessoas: peopleDatabase, dataBackup: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `nexcooee_backup_${Date.now()}.json`;
  a.click();
  showStatus('✅ Backup salvo com sucesso!', 'success');
}

function restaurarBackup(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const dados = JSON.parse(e.target.result);
      if (dados.pessoas && Array.isArray(dados.pessoas)) {
        peopleDatabase = dados.pessoas;
        persistData();
        renderPeopleList();
        showStatus(`✅ Backup restaurado! ${peopleDatabase.length} registros carregados.`, 'success');
      } else { showStatus('❌ Arquivo de backup inválido!', 'error'); }
    } catch(error) { showStatus('❌ Erro ao ler arquivo de backup!', 'error'); }
  };
  reader.readAsText(file);
}

// EVENTOS
document.getElementById('addBtn').addEventListener('click', () => {
  addPerson(
    document.getElementById('fullName').value,
    document.getElementById('personEmail').value,
    document.getElementById('personPhone').value,
    document.getElementById('personLocation').value
  );
  document.getElementById('fullName').value = '';
  document.getElementById('personEmail').value = '';
  document.getElementById('personPhone').value = '';
  document.getElementById('personLocation').value = '';
});
document.getElementById('searchInput').addEventListener('input', (e) => {
  currentSearchTerm = e.target.value;
  renderPeopleList();
});
document.getElementById('clearSearchBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  currentSearchTerm = '';
  renderPeopleList();
});
document.getElementById('backupBtn').addEventListener('click', fazerBackup);
document.getElementById('restoreBtn').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => { if (e.target.files[0]) restaurarBackup(e.target.files[0]); };
  input.click();
});

// INICIALIZAÇÃO
loadFromStorage();
</script>
</body>
</html>
