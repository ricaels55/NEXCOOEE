<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NexCooee Admin | Sistema de Controle</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      font-family: 'Inter', 'JetBrains Mono', monospace;
      color: #ccf5ff;
      overflow-x: hidden;
    }
    .hacker-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35;
      overflow: hidden;
    }
    .rain {
      position: absolute;
      top: -20%;
      left: 0;
      width: 100%;
      height: 120%;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: #0f8;
      white-space: pre;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-30vh); opacity: 0.2; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
    .app-container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }
    .glass-card {
      background: rgba(10, 20, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 2rem;
      padding: 1.8rem;
    }
    .glitch-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a5f0d6, #1effbc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .input-field {
      background: #0b141ab3;
      border: 1px solid #2c5a4a;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #d0f0ff;
      outline: none;
      width: 100%;
      margin-bottom: 1rem;
    }
    .input-field:focus {
      border-color: #1effbc;
      box-shadow: 0 0 12px #1effbc40;
    }
    .btn {
      background: linear-gradient(95deg, #0c2b24, #05100e);
      border: 1px solid #2affb6;
      border-radius: 2.5rem;
      padding: 0.7rem 1.5rem;
      font-weight: 600;
      font-family: 'Inter', monospace;
      color: #ccfff0;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      background: #0f392e;
      box-shadow: 0 0 8px #2effb3;
      transform: scale(0.97);
    }
    .btn-danger {
      border-color: #ff6e6e;
      color: #ffcccc;
    }
    .btn-danger:hover { background: #3a1a1a; }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .hidden { display: none; }
    .badge-admin { background: #1effbc20; color: #1effbc; padding: 0.2rem 0.8rem; border-radius: 1rem; font-size: 0.7rem; }
    .badge-user { background: #ffb62a20; color: #ffb62a; padding: 0.2rem 0.8rem; border-radius: 1rem; font-size: 0.7rem; }
    .badge-banned { background: #ff6e6e20; color: #ff6e6e; text-decoration: line-through; padding: 0.2rem 0.8rem; border-radius: 1rem; font-size: 0.7rem; }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .user-card {
      background: rgba(8, 18, 22, 0.8);
      border-radius: 1.5rem;
      border: 1px solid rgba(0, 255, 170, 0.3);
      padding: 1rem;
      transition: 0.2s;
    }
    .user-card:hover { border-color: #1effbc; transform: translateY(-2px); }
    .small-text { font-size: 0.7rem; opacity: 0.7; }
    .admin-panel { border-top: 2px solid #1effbc; margin-top: 2rem; padding-top: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #2c5a4a; }
    th { color: #1effbc; }
    .empty-msg { text-align: center; padding: 2rem; background: #0712156b; border-radius: 1.5rem; border: 1px dashed #1effbc; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.6; }
    @media (max-width: 640px) { .glitch-title { font-size: 1.8rem; } .app-container { padding: 1rem; } }
  </style>
</head>
<body>
<div class="hacker-bg" id="matrixBg"></div>

<div class="app-container">
  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="glass-card" style="max-width: 450px; margin: 10vh auto; text-align: center;">
    <div class="glitch-title">>_NEXCOOEE</div>
    <div style="margin: 1rem 0;"><i class="fas fa-shield-haltered" style="font-size: 3rem; color: #1effbc;"></i></div>
    <input type="email" id="loginEmail" class="input-field" placeholder="E-mail" autocomplete="off">
    <input type="password" id="loginPassword" class="input-field" placeholder="Senha" autocomplete="off">
    <div style="display: flex; gap: 1rem; justify-content: center;">
      <button id="loginBtn" class="btn"><i class="fas fa-key"></i> Entrar</button>
      <button id="registerBtn" class="btn"><i class="fas fa-user-plus"></i> Registrar</button>
    </div>
    <div id="loginMessage" class="small-text" style="margin-top: 1rem;"></div>
  </div>

  <!-- PAINEL PRINCIPAL -->
  <div id="mainPanel" class="hidden">
    <div class="flex-between">
      <div>
        <div class="glitch-title">>_NEXCOOEE</div>
        <div class="small-text">// painel de controle • cooee club</div>
      </div>
      <div>
        <span id="userCargoBadge" class="badge-user"></span>
        <button id="logoutBtn" class="btn" style="margin-left: 1rem;"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </div>

    <!-- INJECT NEW TARGET -->
    <div class="glass-card" style="margin-top: 1.5rem;">
      <h3><i class="fas fa-user-secret"></i> INJECT NEW TARGET</h3>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;">
        <input type="text" id="fullName" class="input-field" style="flex:1;" placeholder="Nome completo">
        <input type="text" id="personEmail" class="input-field" style="flex:1;" placeholder="E-mail">
        <input type="text" id="personPhone" class="input-field" style="flex:1;" placeholder="Telefone">
        <input type="text" id="personLocation" class="input-field" style="flex:1;" placeholder="Cidade/País">
        <button id="addPersonBtn" class="btn"><i class="fas fa-skull-crosswalk"></i> INJECT</button>
      </div>
      <div id="peopleGrid" class="data-grid" style="margin-top: 1rem;"></div>
    </div>

    <!-- PAINEL ADMIN -->
    <div id="adminPanel" class="admin-panel hidden">
      <h2><i class="fas fa-crown"></i> PAINEL ADMIN</h2>
      
      <div class="glass-card" style="margin-top: 1rem;">
        <h3><i class="fas fa-users"></i> Gerenciar Usuários</h3>
        <div style="overflow-x: auto;">
          <table id="usersTable">
            <thead><tr><th>Email</th><th>Cargo</th><th>Status</th><th>IP</th><th>Último acesso</th><th>Ações</th></tr></thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="glass-card" style="margin-top: 1rem;">
        <h3><i class="fas fa-table"></i> Logs de Acesso</h3>
        <div style="overflow-x: auto; max-height: 300px; overflow-y: auto;">
          <table>
            <thead><tr><th>Usuário</th><th>IP</th><th>Ação</th><th>Data</th></tr></thead>
            <tbody id="logsTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="glass-card" style="margin-top: 1rem;">
        <h3><i class="fas fa-ban"></i> IPs Banidos</h3>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
          <input type="text" id="banIpInput" class="input-field" style="flex:1;" placeholder="Digite o IP para banir">
          <button id="banIpBtn" class="btn btn-danger"><i class="fas fa-ban"></i> Banir IP</button>
        </div>
        <div id="bannedIpsList" style="margin-top: 1rem;"></div>
      </div>
    </div>
    <footer><i class="fas fa-terminal"></i> [ NexCooee • Sistema com Autenticação • Admin Panel ]</footer>
  </div>
</div>

<script>
// ========== SUPABASE CONFIG - Usando variáveis de ambiente do Vercel ==========
// As variáveis NEXT_PUBLIC_SUPABASE_URL e NEXT_PUBLIC_SUPABASE_ANON_KEY
// já estão configuradas no Vercel. O código vai pegá-las automaticamente.

// Fallback para desenvolvimento local (se não encontrar as variáveis)
const SUPABASE_URL = window._env_?.NEXT_PUBLIC_SUPABASE_URL || 
                     (typeof process !== 'undefined' && process.env?.NEXT_PUBLIC_SUPABASE_URL) ||
                     "https://d-vxot6yg8ov-9txf7u9ma-ccsop5-e.supabase.co";
                     
const SUPABASE_ANON_KEY = window._env_?.NEXT_PUBLIC_SUPABASE_ANON_KEY || 
                          (typeof process !== 'undefined' && process.env?.NEXT_PUBLIC_SUPABASE_ANON_KEY) ||
                          "sb_publishable_egE-WfT-Aq8QpWfdVbQvpg_XwqnFy4B";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentUserCargo = null;
let peopleDatabase = [];

// ========== FUNÇÕES ==========
async function getIP() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    return data.ip;
  } catch(e) { return '0.0.0.0'; }
}

async function registrarLog(acao) {
  const ip = await getIP();
  if (currentUser) {
    await supabase.from('logs').insert([{
      usuario_id: currentUser.id,
      email: currentUser.email,
      ip: ip,
      acao: acao
    }]);
  }
}

async function carregarPerfil(userId) {
  const { data } = await supabase.from('perfis').select('*').eq('id', userId).single();
  if (data) {
    currentUserCargo = data.cargo;
    await supabase.from('perfis').update({ ultimo_acesso: new Date(), ip: await getIP() }).eq('id', userId);
  }
  return data;
}

// ========== DADOS PESSOAIS (LOCAL) ==========
function salvarPessoasLocal() {
  localStorage.setItem('nexcooee_pessoas', JSON.stringify(peopleDatabase));
}

function carregarPessoasLocal() {
  const stored = localStorage.getItem('nexcooee_pessoas');
  if (stored) { peopleDatabase = JSON.parse(stored); }
  else { peopleDatabase = []; }
  renderizarPessoas();
}

function adicionarPessoa(nome, email, telefone, local) {
  if (!nome.trim()) { alert('⚠️ Nome obrigatório'); return; }
  peopleDatabase.unshift({
    id: Date.now().toString(),
    nome: nome.trim(),
    email: email.trim(),
    telefone: telefone.trim(),
    local: local.trim() || 'Desconhecido',
    data: new Date().toLocaleString()
  });
  salvarPessoasLocal();
  renderizarPessoas();
}

function deletarPessoa(id) {
  peopleDatabase = peopleDatabase.filter(p => p.id !== id);
  salvarPessoasLocal();
  renderizarPessoas();
}

function renderizarPessoas() {
  const grid = document.getElementById('peopleGrid');
  if (!grid) return;
  if (!peopleDatabase.length) {
    grid.innerHTML = '<div class="empty-msg"><i class="fas fa-user-slash"></i> Nenhum registro encontrado.<br>Adicione novos registros ou limpe o filtro.</div>';
    return;
  }
  grid.innerHTML = peopleDatabase.map(p => `
    <div class="user-card">
      <div><strong>${p.nome}</strong></div>
      <div class="small-text">📧 ${p.email}</div>
      <div class="small-text">📞 ${p.telefone}</div>
      <div class="small-text">📍 ${p.local}</div>
      <div class="small-text">🕒 ${p.data}</div>
      <button class="btn" style="margin-top: 0.5rem; padding: 0.3rem 1rem;" onclick="deletarPessoa('${p.id}')">🗑️ Remover</button>
    </div>
  `).join('');
}

// ========== PAINEL ADMIN ==========
async function carregarUsuarios() {
  const { data: perfis } = await supabase.from('perfis').select('*');
  const tbody = document.getElementById('usersTableBody');
  if (!tbody) return;
  tbody.innerHTML = (perfis || []).map(u => `
    <tr>
      <td>${u.email}</td>
      <td>
        <select onchange="mudarCargo('${u.id}', this.value)" ${currentUser?.id === u.id ? 'disabled' : ''}>
          <option value="user" ${u.cargo === 'user' ? 'selected' : ''}>Usuário</option>
          <option value="moderador" ${u.cargo === 'moderador' ? 'selected' : ''}>Moderador</option>
          <option value="admin" ${u.cargo === 'admin' ? 'selected' : ''}>Admin</option>
        </select>
      </td>
      <td>${u.banido ? '<span class="badge-banned">BANIDO</span>' : '<span class="badge-user">Ativo</span>'}</td>
      <td class="small-text">${u.ip || '?'}</td>
      <td class="small-text">${u.ultimo_acesso ? new Date(u.ultimo_acesso).toLocaleString() : '-'}</td>
      <td>
        <button class="btn" style="padding: 0.2rem 0.8rem;" onclick="banirUsuario('${u.id}')">🚫 Banir</button>
        ${u.banido ? `<button class="btn" style="padding: 0.2rem 0.8rem;" onclick="desbanirUsuario('${u.id}')">✅ Desbanir</button>` : ''}
       </td>
    </tr>
  `).join('');
}

async function carregarLogs() {
  const { data } = await supabase.from('logs').select('*').order('data', { ascending: false }).limit(50);
  const tbody = document.getElementById('logsTableBody');
  if (!tbody) return;
  tbody.innerHTML = (data || []).map(l => `
    <tr>
      <td>${l.email || l.usuario_id?.slice(0,8)}</td>
      <td class="small-text">${l.ip}</td>
      <td>${l.acao}</td>
      <td class="small-text">${new Date(l.data).toLocaleString()}</td>
    </tr>
  `).join('');
}

async function carregarIPsBanidos() {
  const { data } = await supabase.from('ips_banidos').select('*');
  const div = document.getElementById('bannedIpsList');
  if (!div) return;
  div.innerHTML = (data || []).map(ip => `
    <div class="user-card" style="display: inline-block; margin: 0.3rem; padding: 0.3rem 0.8rem;">
      <i class="fas fa-ban"></i> ${ip.ip} <button onclick="desbanirIP('${ip.ip}')" style="margin-left: 0.5rem; cursor: pointer; background: none; border: none; color: #ff6e6e;">❌</button>
    </div>
  `).join('');
}

window.mudarCargo = async (userId, novoCargo) => {
  if (currentUser?.id === userId) { alert('Não pode mudar seu próprio cargo'); return; }
  await supabase.from('perfis').update({ cargo: novoCargo }).eq('id', userId);
  await registrarLog(`Mudou cargo para ${novoCargo}`);
  carregarUsuarios();
};

window.banirUsuario = async (userId) => {
  await supabase.from('perfis').update({ banido: true }).eq('id', userId);
  await registrarLog(`Banido usuário`);
  carregarUsuarios();
};

window.desbanirUsuario = async (userId) => {
  await supabase.from('perfis').update({ banido: false }).eq('id', userId);
  await registrarLog(`Desbanido usuário`);
  carregarUsuarios();
};

window.desbanirIP = async (ip) => {
  await supabase.from('ips_banidos').delete().eq('ip', ip);
  carregarIPsBanidos();
};

window.deletarPessoa = deletarPessoa;

// ========== EVENTOS ==========
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const ip = await getIP();
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('loginMessage').innerHTML = '❌ ' + error.message;
    return;
  }
  
  currentUser = data.user;
  const perfil = await carregarPerfil(currentUser.id);
  
  if (perfil && perfil.banido) {
    alert('⛔ Usuário banido!');
    await supabase.auth.signOut();
    return;
  }
  
  const { data: ipBanido } = await supabase.from('ips_banidos').select('ip').eq('ip', ip);
  if (ipBanido && ipBanido.length > 0) {
    alert('⛔ Seu IP está banido!');
    await supabase.auth.signOut();
    return;
  }
  
  await registrarLog('Login realizado');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainPanel').classList.remove('hidden');
  
  const badge = document.getElementById('userCargoBadge');
  badge.innerHTML = `<i class="fas fa-${perfil.cargo === 'admin' ? 'crown' : 'user'}"></i> ${perfil.cargo || 'user'}`;
  badge.className = perfil.cargo === 'admin' ? 'badge-admin' : 'badge-user';
  
  if (perfil.cargo === 'admin') {
    document.getElementById('adminPanel').classList.remove('hidden');
    carregarUsuarios();
    carregarLogs();
    carregarIPsBanidos();
  }
  
  carregarPessoasLocal();
};

document.getElementById('registerBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { alert('Preencha email e senha'); return; }
  
  const ip = await getIP();
  const { data, error } = await supabase.auth.signUp({ email, password });
  if (error) { alert('❌ ' + error.message); return; }
  
  await supabase.from('perfis').insert([{
    id: data.user.id,
    email: email,
    cargo: 'user',
    banido: false,
    ip: ip
  }]);
  
  alert('✅ Conta criada! Faça login.');
};

document.getElementById('logoutBtn').onclick = async () => {
  await registrarLog('Logout');
  await supabase.auth.signOut();
  location.reload();
};

document.getElementById('addPersonBtn')?.addEventListener('click', () => {
  adicionarPessoa(
    document.getElementById('fullName').value,
    document.getElementById('personEmail').value,
    document.getElementById('personPhone').value,
    document.getElementById('personLocation').value
  );
  document.getElementById('fullName').value = '';
  document.getElementById('personEmail').value = '';
  document.getElementById('personPhone').value = '';
  document.getElementById('personLocation').value = '';
});

document.getElementById('banIpBtn')?.addEventListener('click', async () => {
  const ip = document.getElementById('banIpInput').value;
  if (!ip) { alert('Digite um IP'); return; }
  await supabase.from('ips_banidos').insert([{ ip, banido_por: currentUser?.email }]);
  await registrarLog(`Banido IP: ${ip}`);
  document.getElementById('banIpInput').value = '';
  carregarIPsBanidos();
});

// ========== BACKGROUND RAIN ==========
function initRain() {
  const bg = document.getElementById('matrixBg');
  if (!bg) return;
  bg.innerHTML = '';
  const chars = '01アイウエオカキクケコサシスソタチツテト';
  for (let i = 0; i < 60; i++) {
    const rain = document.createElement('div');
    rain.className = 'rain';
    let txt = '';
    for (let j = 0; j < 20; j++) txt += chars[Math.floor(Math.random() * chars.length)];
    rain.textContent = txt;
    rain.style.left = Math.random() * 100 + '%';
    rain.style.fontSize = (Math.random() * 18 + 10) + 'px';
    rain.style.animationDuration = (Math.random() * 4 + 2) + 's';
    rain.style.animationDelay = Math.random() * 10 + 's';
    rain.style.opacity = Math.random() * 0.4 + 0.1;
    bg.appendChild(rain);
  }
}
initRain();

setInterval(() => {
  const bg = document.getElementById('matrixBg');
  if (bg && bg.children.length) {
    for (let i = 0; i < 5; i++) {
      const r = bg.children[Math.floor(Math.random() * bg.children.length)];
      if (r) {
        const chars = '01アイウエオカキクケコサシスソ';
        let newTxt = '';
        for (let j = 0; j < r.textContent.length; j++) newTxt += chars[Math.floor(Math.random() * chars.length)];
        r.textContent = newTxt;
      }
    }
  }
}, 2000);

// Verificar sessão existente
supabase.auth.getSession().then(async ({ data }) => {
  if (data.session) {
    currentUser = data.session.user;
    const perfil = await carregarPerfil(currentUser.id);
    if (perfil && !perfil.banido) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainPanel').classList.remove('hidden');
      const badge = document.getElementById('userCargoBadge');
      badge.innerHTML = `<i class="fas fa-${perfil.cargo === 'admin' ? 'crown' : 'user'}"></i> ${perfil.cargo}`;
      badge.className = perfil.cargo === 'admin' ? 'badge-admin' : 'badge-user';
      if (perfil.cargo === 'admin') {
        document.getElementById('adminPanel').classList.remove('hidden');
        carregarUsuarios();
        carregarLogs();
        carregarIPsBanidos();
      }
      carregarPessoasLocal();
    }
  }
});
</script>
</body>
</html>
