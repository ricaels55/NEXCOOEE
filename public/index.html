<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NexCooee | Sistema com Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      font-family: 'Inter', monospace;
      color: #ccf5ff;
      overflow-x: hidden;
    }
    .hacker-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35;
      overflow: hidden;
    }
    .rain {
      position: absolute;
      top: -20%;
      left: 0;
      width: 100%;
      height: 120%;
      font-family: monospace;
      font-size: 16px;
      color: #0f8;
      white-space: pre;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-30vh); opacity: 0.2; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
    .app-container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }
    .glass-card {
      background: rgba(10, 20, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 2rem;
      padding: 1.8rem;
    }
    .glitch-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a5f0d6, #1effbc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .input-field {
      background: #0b141ab3;
      border: 1px solid #2c5a4a;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      font-family: monospace;
      color: #d0f0ff;
      outline: none;
      width: 100%;
      margin-bottom: 1rem;
    }
    .btn {
      background: linear-gradient(95deg, #0c2b24, #05100e);
      border: 1px solid #2affb6;
      border-radius: 2.5rem;
      padding: 0.7rem 1.5rem;
      font-weight: 600;
      color: #ccfff0;
      cursor: pointer;
      display: inline-block;
      margin: 0.3rem;
    }
    .btn:hover { background: #0f392e; transform: scale(0.97); }
    .btn-danger { border-color: #ff6e6e; color: #ffcccc; }
    .hidden { display: none; }
    .small-text { font-size: 0.7rem; opacity: 0.7; margin-top: 1rem; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .badge-admin { background: #1effbc20; color: #1effbc; padding: 0.2rem 0.8rem; border-radius: 1rem; font-size: 0.7rem; }
    .badge-user { background: #ffb62a20; color: #ffb62a; padding: 0.2rem 0.8rem; border-radius: 1rem; font-size: 0.7rem; }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .data-card {
      background: rgba(8, 18, 22, 0.8);
      border-radius: 1.5rem;
      border: 1px solid rgba(0, 255, 170, 0.3);
      padding: 1rem;
      cursor: pointer;
      position: relative;
    }
    .data-card:hover { border-color: #1effbc; }
    .delete-icon {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ff6e7f;
      cursor: pointer;
    }
    .admin-only { display: none; }
    .empty-msg { text-align: center; padding: 2rem; background: #0712156b; border-radius: 1.5rem; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.6; }
  </style>
</head>
<body>
<div class="hacker-bg" id="matrixBg"></div>

<div class="app-container">
  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="glass-card" style="max-width: 450px; margin: 10vh auto; text-align: center;">
    <div class="glitch-title">>_NEXCOOEE</div>
    <div style="margin: 1rem 0;"><i class="fas fa-shield-haltered" style="font-size: 3rem; color: #1effbc;"></i></div>
    <input type="email" id="loginEmail" class="input-field" placeholder="E-mail" autocomplete="off">
    <input type="password" id="loginPassword" class="input-field" placeholder="Senha" autocomplete="off">
    <div style="display: flex; gap: 1rem; justify-content: center;">
      <button id="loginBtn" class="btn"><i class="fas fa-key"></i> Entrar</button>
      <button id="registerBtn" class="btn"><i class="fas fa-user-plus"></i> Registrar</button>
    </div>
    <div id="loginMessage" class="small-text"></div>
  </div>

  <!-- PAINEL PRINCIPAL -->
  <div id="mainPanel" class="hidden">
    <div class="flex-between">
      <div>
        <div class="glitch-title">>_NEXCOOEE</div>
        <div class="small-text">// cooee club • data nexus</div>
      </div>
      <div>
        <span id="userTypeBadge" class="badge-user"></span>
        <button id="logoutBtn" class="btn" style="margin-left: 1rem;"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </div>

    <!-- PAINEL ADMIN (só aparece para admin) -->
    <div id="adminPanel" class="glass-card admin-only" style="margin-top: 1.5rem;">
      <div class="section-title"><i class="fas fa-user-secret"></i> <span>INJECT NEW TARGET</span></div>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <input type="text" id="fullName" class="input-field" style="flex:1;" placeholder="Nome completo">
        <input type="text" id="personEmail" class="input-field" style="flex:1;" placeholder="E-mail">
        <input type="text" id="personPhone" class="input-field" style="flex:1;" placeholder="Telefone">
        <input type="text" id="personLocation" class="input-field" style="flex:1;" placeholder="Cidade/País">
        <button id="addPersonBtn" class="btn"><i class="fas fa-skull-crosswalk"></i> INJECT</button>
      </div>
      <div class="status-message" id="addStatus" style="font-size:0.8rem; margin-top:1rem;"></div>
    </div>

    <!-- BUSCA (todos podem) -->
    <div style="margin: 1.5rem 0 1rem; display: flex; gap: 1rem; flex-wrap: wrap;">
      <input type="text" id="searchInput" class="input-field" style="flex:2;" placeholder="🔍 Buscar por nome, email ou local...">
      <button id="clearSearchBtn" class="btn"><i class="fas fa-times"></i> Limpar</button>
    </div>

    <!-- CARDS (todos podem ver) -->
    <div id="peopleGrid" class="data-grid">
      <div class="empty-msg">Carregando...</div>
    </div>
    <footer><i class="fas fa-terminal"></i> [ NexCooee • Sistema com Login • Acesso restrito ]</footer>
  </div>
</div>

<script>
// CONFIGURAÇÃO DO SUPABASE
// !!! SUBSTITUA PELA SUA URL E CHAVE CORRETAS !!!
const SUPABASE_URL = "https://SEU_PROJETO.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_SUA_CHAVE";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentUserType = null;
let allData = [];

// FUNDO HACKER
function initRain() {
  const bg = document.getElementById('matrixBg');
  if (!bg) return;
  bg.innerHTML = '';
  const chars = '01アイウエオカキクケコ';
  for (let i = 0; i < 50; i++) {
    const rain = document.createElement('div');
    rain.className = 'rain';
    let txt = '';
    for (let j = 0; j < 20; j++) txt += chars[Math.floor(Math.random() * chars.length)];
    rain.textContent = txt;
    rain.style.left = Math.random() * 100 + '%';
    rain.style.animationDuration = (Math.random() * 4 + 2) + 's';
    rain.style.animationDelay = Math.random() * 10 + 's';
    bg.appendChild(rain);
  }
}
initRain();

// CARREGAR DADOS DO SUPABASE
async function carregarDados() {
  const { data, error } = await supabase.from('dados').select('*').order('criado_em', { ascending: false });
  if (error) {
    console.error('Erro ao carregar dados:', error);
    return [];
  }
  return data || [];
}

function renderCards(dados) {
  const grid = document.getElementById('peopleGrid');
  if (!grid) return;
  if (!dados || dados.length === 0) {
    grid.innerHTML = '<div class="empty-msg"><i class="fas fa-user-slash"></i> Nenhum registro encontrado.</div>';
    document.getElementById('recordCount').innerText = '0';
    return;
  }
  document.getElementById('recordCount').innerText = dados.length;
  const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
  let filtered = dados;
  if (searchTerm) {
    filtered = dados.filter(p => 
      p.nome?.toLowerCase().includes(searchTerm) ||
      p.email?.toLowerCase().includes(searchTerm) ||
      p.local?.toLowerCase().includes(searchTerm) ||
      p.telefone?.includes(searchTerm)
    );
  }
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-msg"><i class="fas fa-search"></i> Nenhum resultado para sua busca.</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => `
    <div class="data-card" data-id="${p.id}">
      <div style="display:flex; justify-content:space-between;">
        <strong>${escapeHtml(p.nome)}</strong>
        <span style="font-size:0.65rem; opacity:0.6;">id:${p.id.toString().slice(-6)}</span>
      </div>
      <div class="small-text">📧 ${escapeHtml(p.email) || '—'}</div>
      <div class="small-text">📞 ${escapeHtml(p.telefone) || '—'}</div>
      <div class="small-text">📍 ${escapeHtml(p.local) || '—'}</div>
      <div class="small-text">🕒 ${new Date(p.criado_em).toLocaleString()}</div>
      ${currentUserType === 'admin' ? `<div class="delete-icon" data-id="${p.id}"><i class="fas fa-trash-alt"></i></div>` : ''}
    </div>
  `).join('');
  if (currentUserType === 'admin') {
    document.querySelectorAll('.delete-icon').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        if (confirm('Remover permanentemente?')) {
          await supabase.from('dados').delete().eq('id', id);
          carregarDados().then(data => { allData = data; renderCards(allData); });
          showStatus('addStatus', '✅ Registro removido!');
        }
      });
    });
  }
  document.querySelectorAll('.data-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.delete-icon')) return;
      const id = card.getAttribute('data-id');
      const pessoa = allData.find(p => p.id == id);
      if (pessoa) {
        alert(`🔎 DETALHES\n\nNome: ${pessoa.nome}\nEmail: ${pessoa.email || '—'}\nTelefone: ${pessoa.telefone || '—'}\nLocal: ${pessoa.local || '—'}\nID: ${pessoa.id}`);
      }
    });
  });
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

function showStatus(elId, msg) { const el = document.getElementById(elId); if (el) { el.innerText = msg; setTimeout(() => el.innerText = '', 3000); } }

// LOGIN
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMessage');
  if (!email || !password) { msg.innerHTML = '❌ Preencha email e senha!'; return; }
  msg.innerHTML = '🔄 Entrando...';
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) { msg.innerHTML = '❌ ' + error.message; return; }
  const { data: userData } = await supabase.from('usuarios').select('tipo').eq('id', data.user.id).single();
  currentUser = data.user;
  currentUserType = userData?.tipo || 'user';
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainPanel').classList.remove('hidden');
  const badge = document.getElementById('userTypeBadge');
  if (currentUserType === 'admin') {
    badge.innerHTML = '<i class="fas fa-crown"></i> ADMIN';
    badge.className = 'badge-admin';
    document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('admin-only'));
  } else {
    badge.innerHTML = '<i class="fas fa-user"></i> USUÁRIO';
    badge.className = 'badge-user';
  }
  allData = await carregarDados();
  renderCards(allData);
  msg.innerHTML = '';
};

// REGISTRO
document.getElementById('registerBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMessage');
  if (!email || !password) { msg.innerHTML = '❌ Preencha email e senha!'; return; }
  msg.innerHTML = '🔄 Criando conta...';
  const { data, error } = await supabase.auth.signUp({ email, password });
  if (error) { msg.innerHTML = '❌ ' + error.message; return; }
  await supabase.from('usuarios').insert([{ id: data.user.id, email: email, tipo: 'user' }]);
  msg.innerHTML = '✅ Conta criada! Agora faça login.';
};

// LOGOUT
document.getElementById('logoutBtn').onclick = async () => {
  await supabase.auth.signOut();
  location.reload();
};

// ADMIN: ADICIONAR PESSOA
document.getElementById('addPersonBtn')?.addEventListener('click', async () => {
  const nome = document.getElementById('fullName')?.value;
  const email = document.getElementById('personEmail')?.value;
  const telefone = document.getElementById('personPhone')?.value;
  const local = document.getElementById('personLocation')?.value;
  if (!nome.trim()) { showStatus('addStatus', '⚠️ Nome obrigatório!'); return; }
  const { error } = await supabase.from('dados').insert([{
    nome: nome.trim(),
    email: email.trim(),
    telefone: telefone.trim(),
    local: local.trim(),
    criado_por: currentUser?.id
  }]);
  if (error) { showStatus('addStatus', '❌ Erro ao adicionar!'); return; }
  showStatus('addStatus', '✅ Pessoa adicionada!');
  document.getElementById('fullName').value = '';
  document.getElementById('personEmail').value = '';
  document.getElementById('personPhone').value = '';
  document.getElementById('personLocation').value = '';
  allData = await carregarDados();
  renderCards(allData);
});

// BUSCA
document.getElementById('searchInput')?.addEventListener('input', () => { renderCards(allData); });
document.getElementById('clearSearchBtn')?.addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  renderCards(allData);
});

// VERIFICAR SESSÃO EXISTENTE
supabase.auth.getSession().then(async ({ data }) => {
  if (data.session) {
    currentUser = data.session.user;
    const { data: userData } = await supabase.from('usuarios').select('tipo').eq('id', currentUser.id).single();
    currentUserType = userData?.tipo || 'user';
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainPanel').classList.remove('hidden');
    const badge = document.getElementById('userTypeBadge');
    if (currentUserType === 'admin') {
      badge.innerHTML = '<i class="fas fa-crown"></i> ADMIN';
      badge.className = 'badge-admin';
      document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('admin-only'));
    } else {
      badge.innerHTML = '<i class="fas fa-user"></i> USUÁRIO';
      badge.className = 'badge-user';
    }
    allData = await carregarDados();
    renderCards(allData);
    document.getElementById('recordCount')?.addEventListener('change', () => {});
  }
});
</script>
</body>
</html>
