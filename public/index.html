<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCooee | Sistema</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      font-family: 'Inter', monospace;
      color: #ccf5ff;
    }
    .app-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .glass-card {
      background: rgba(10, 20, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 2rem;
      padding: 2rem;
    }
    .glitch-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a5f0d6, #1effbc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .input-field {
      background: #0b141ab3;
      border: 1px solid #2c5a4a;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      font-family: monospace;
      color: #d0f0ff;
      outline: none;
      width: 100%;
      margin-bottom: 1rem;
    }
    .btn {
      background: linear-gradient(95deg, #0c2b24, #05100e);
      border: 1px solid #2affb6;
      border-radius: 2.5rem;
      padding: 0.7rem 1.5rem;
      font-weight: 600;
      color: #ccfff0;
      cursor: pointer;
      display: inline-block;
      margin: 0.3rem;
    }
    .btn:hover { background: #0f392e; transform: scale(0.97); }
    .hidden { display: none; }
    .small-text { font-size: 0.7rem; opacity: 0.7; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="app-container">
  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="glass-card" style="max-width: 450px; margin: 10vh auto; text-align: center;">
    <div class="glitch-title">>_NEXCOOEE</div>
    <div style="margin: 1rem 0;"><i class="fas fa-shield-haltered" style="font-size: 3rem; color: #1effbc;"></i></div>
    <input type="email" id="loginEmail" class="input-field" placeholder="E-mail">
    <input type="password" id="loginPassword" class="input-field" placeholder="Senha">
    <button id="registerBtn" class="btn"><i class="fas fa-user-plus"></i> Registrar</button>
    <button id="loginBtn" class="btn"><i class="fas fa-key"></i> Entrar</button>
    <div id="loginMessage" class="small-text"></div>
  </div>

  <!-- PAINEL PRINCIPAL -->
  <div id="mainPanel" class="hidden">
    <div class="glass-card">
      <div class="glitch-title">>_NEXCOOEE</div>
      <div class="small-text">// painel de controle • cooee club</div>
      <button id="logoutBtn" class="btn" style="margin-top: 1rem;"><i class="fas fa-sign-out-alt"></i> Sair</button>
      <hr style="margin: 1rem 0; border-color: #2c5a4a;">
      <h3><i class="fas fa-user-secret"></i> INJECT NEW TARGET</h3>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;">
        <input type="text" id="fullName" class="input-field" style="flex:1;" placeholder="Nome completo">
        <input type="text" id="personEmail" class="input-field" style="flex:1;" placeholder="E-mail">
        <input type="text" id="personPhone" class="input-field" style="flex:1;" placeholder="Telefone">
        <input type="text" id="personLocation" class="input-field" style="flex:1;" placeholder="Cidade/País">
        <button id="addPersonBtn" class="btn">INJECT</button>
      </div>
      <div id="peopleGrid" style="margin-top: 1rem;"></div>
    </div>
  </div>
</div>

<script>
// CONEXÃO ÚNICA COM SUPABASE
const SUPABASE_URL = "https://d-vxot6yg8ov-9txf7u9ma-ccsop5-e.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_egE-WfT-Aq8QpWfdVbQvpg_XwqnFy4B";

// Criar UMA única instância
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let peopleDatabase = [];

// Funções
async function registrarLog(acao) {
  if (currentUser) {
    await supabase.from('logs').insert([{
      usuario_id: currentUser.id,
      email: currentUser.email,
      acao: acao
    }]);
  }
}

// Registrar usuário
document.getElementById('registerBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMessage');
  
  if (!email || !password) {
    msg.innerHTML = '❌ Preencha email e senha!';
    return;
  }
  
  msg.innerHTML = '🔄 Criando conta...';
  
  const { data, error } = await supabase.auth.signUp({ email, password });
  
  if (error) {
    msg.innerHTML = '❌ ' + error.message;
    return;
  }
  
  if (data.user) {
    // Criar perfil do usuário
    await supabase.from('perfis').insert([{
      id: data.user.id,
      email: email,
      cargo: 'user'
    }]);
    msg.innerHTML = '✅ Conta criada! Agora faça login.';
  }
};

// Login
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMessage');
  
  if (!email || !password) {
    msg.innerHTML = '❌ Preencha email e senha!';
    return;
  }
  
  msg.innerHTML = '🔄 Entrando...';
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    msg.innerHTML = '❌ ' + error.message;
    return;
  }
  
  currentUser = data.user;
  await registrarLog('Login');
  
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainPanel').classList.remove('hidden');
  
  carregarPessoasLocal();
  msg.innerHTML = '';
};

// Logout
document.getElementById('logoutBtn').onclick = async () => {
  await registrarLog('Logout');
  await supabase.auth.signOut();
  location.reload();
};

// Dados pessoais (local)
function carregarPessoasLocal() {
  const stored = localStorage.getItem('nexcooee_pessoas');
  peopleDatabase = stored ? JSON.parse(stored) : [];
  renderizarPessoas();
}

function salvarPessoasLocal() {
  localStorage.setItem('nexcooee_pessoas', JSON.stringify(peopleDatabase));
}

function adicionarPessoa(nome, email, telefone, local) {
  if (!nome.trim()) { alert('Nome obrigatório'); return; }
  peopleDatabase.unshift({
    id: Date.now().toString(),
    nome: nome.trim(),
    email: email.trim(),
    telefone: telefone.trim(),
    local: local.trim() || 'Desconhecido',
    data: new Date().toLocaleString()
  });
  salvarPessoasLocal();
  renderizarPessoas();
}

function deletarPessoa(id) {
  peopleDatabase = peopleDatabase.filter(p => p.id !== id);
  salvarPessoasLocal();
  renderizarPessoas();
}

function renderizarPessoas() {
  const grid = document.getElementById('peopleGrid');
  if (!grid) return;
  if (!peopleDatabase.length) {
    grid.innerHTML = '<div class="small-text" style="text-align:center;padding:2rem;">Nenhum registro encontrado.</div>';
    return;
  }
  grid.innerHTML = peopleDatabase.map(p => `
    <div style="background:rgba(8,18,22,0.8);border-radius:1rem;border:1px solid rgba(0,255,170,0.3);padding:1rem;margin-bottom:0.5rem;">
      <strong>${p.nome}</strong><br>
      <span class="small-text">📧 ${p.email} | 📞 ${p.telefone} | 📍 ${p.local}</span><br>
      <button class="btn" style="padding:0.2rem 0.8rem; margin-top:0.5rem;" onclick="deletarPessoa('${p.id}')">🗑️ Remover</button>
    </div>
  `).join('');
}

document.getElementById('addPersonBtn').onclick = () => {
  adicionarPessoa(
    document.getElementById('fullName').value,
    document.getElementById('personEmail').value,
    document.getElementById('personPhone').value,
    document.getElementById('personLocation').value
  );
  document.getElementById('fullName').value = '';
  document.getElementById('personEmail').value = '';
  document.getElementById('personPhone').value = '';
  document.getElementById('personLocation').value = '';
};

window.deletarPessoa = deletarPessoa;

// Verificar sessão existente
supabase.auth.getSession().then(({ data }) => {
  if (data.session) {
    currentUser = data.session.user;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainPanel').classList.remove('hidden');
    carregarPessoasLocal();
  }
});
</script>
</body>
</html>
