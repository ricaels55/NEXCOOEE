<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NexCooee | IndexedDB para arquivos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      font-family: 'Inter', monospace;
      color: #ccf5ff;
      overflow-x: hidden;
      position: relative;
    }
    .hacker-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.45;
      overflow: hidden;
    }
    .rain {
      position: absolute;
      top: -20%;
      left: 0;
      width: 100%;
      height: 120%;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: #0f8;
      text-shadow: 0 0 5px #0f8, 0 0 8px #0f8a;
      white-space: pre;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-30vh); opacity: 0.2; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
    .app-container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      backdrop-filter: blur(2px);
    }
    .glitch-title {
      font-size: 3rem;
      font-weight: 800;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a5f0d6, #1effbc, #0fcf9a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      text-shadow: 0 0 8px rgba(0,255,170,0.3);
      position: relative;
      display: inline-block;
    }
    .glitch-title::before,
    .glitch-title::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #a5f0d6, #1effbc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .glitch-title::before { animation: glitch-1 0.4s infinite alternate; clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); }
    .glitch-title::after { animation: glitch-2 0.3s infinite alternate; clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%); }
    @keyframes glitch-1 { 0% { transform: translate(0); opacity: 0.7; } 100% { transform: translate(-2px, 1px); opacity: 1; } }
    @keyframes glitch-2 { 0% { transform: translate(0); opacity: 0.5; } 100% { transform: translate(3px, -1px); opacity: 1; } }
    .sub { font-size: 0.9rem; letter-spacing: 2px; border-left: 3px solid #1effbc; padding-left: 1rem; margin-top: 0.5rem; color: #b4ffe0; }
    .glass-card { background: rgba(10, 20, 28, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 170, 0.3); border-radius: 2rem; padding: 1.8rem; }
    .input-field { background: #0b141ab3; border: 1px solid #2c5a4a; border-radius: 2rem; padding: 0.8rem 1.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #d0f0ff; outline: none; width: 100%; margin-bottom: 1rem; }
    .btn { background: linear-gradient(95deg, #0c2b24, #05100e); border: 1px solid #2affb6; border-radius: 2.5rem; padding: 0.6rem 1.2rem; font-weight: 600; color: #ccfff0; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .btn:hover { background: #0f392e; transform: scale(0.97); }
    .btn-danger { border-color: #ff6e6e; color: #ffcccc; }
    .hidden { display: none; }
    .small-text { font-size: 0.7rem; opacity: 0.7; margin-top: 1rem; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .badge-admin { background: #1effbc20; color: #1effbc; padding: 0.2rem 0.8rem; border-radius: 1rem; font-size: 0.7rem; }
    .badge-user { background: #ffb62a20; color: #ffb62a; padding: 0.2rem 0.8rem; border-radius: 1rem; font-size: 0.7rem; }
    .tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid #2c5a4a; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn { background: transparent; border: none; padding: 0.6rem 1.2rem; font-family: monospace; font-weight: 600; color: #8affcf; cursor: pointer; border-radius: 2rem; transition: 0.2s; }
    .tab-btn.active { background: #1effbc20; color: #1effbc; border: 1px solid #1effbc; }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .data-card, .user-card, .media-card {
      background: rgba(8, 18, 22, 0.8);
      border-radius: 1.5rem;
      border: 1px solid rgba(0, 255, 170, 0.3);
      padding: 1rem;
      position: relative;
      transition: 0.2s;
    }
    .data-card:hover, .user-card:hover, .media-card:hover { border-color: #1effbc; transform: translateY(-2px); }
    .card-name {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(120deg, #baf8e6, #74ffce);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .info-row { display: flex; gap: 8px; margin: 8px 0; font-size: 0.85rem; align-items: center; font-family: monospace; }
    .info-row i { width: 24px; color: #2affbc; }
    .badge { background: #102b24; border-radius: 28px; padding: 2px 10px; font-size: 0.7rem; width: fit-content; margin-top: 8px; border-left: 2px solid #1effbc; }
    .delete-icon { position: absolute; bottom: 12px; right: 16px; color: #ff6e7f; opacity: 0.6; cursor: pointer; }
    .delete-icon:hover { opacity: 1; color: #ff3860; }
    .empty-msg { text-align: center; padding: 3rem; background: #0712156b; border-radius: 2rem; border: 1px dashed #1effbc; }
    footer { text-align: center; margin-top: 3rem; font-size: 0.7rem; opacity: 0.6; }
    .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px dashed #2eaa8a; padding-bottom: 8px; }
    @media (max-width: 640px) { .glitch-title { font-size: 2rem; } .app-container { padding: 1rem; } }
  </style>
</head>
<body>
<div class="hacker-bg" id="matrixBg"></div>

<div class="app-container">
  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="glass-card" style="max-width: 450px; margin: 10vh auto; text-align: center;">
    <div class="glitch-title" data-text=">_NEXCOOEE">>_NEXCOOEE</div>
    <div style="margin: 1rem 0;"><i class="fas fa-shield-haltered" style="font-size: 3rem; color: #1effbc;"></i></div>
    <input type="email" id="loginEmail" class="input-field" placeholder="E-mail">
    <input type="password" id="loginPassword" class="input-field" placeholder="Senha">
    <div style="display: flex; gap: 1rem; justify-content: center;">
      <button id="loginBtn" class="btn"><i class="fas fa-key"></i> Entrar</button>
      <button id="registerBtn" class="btn"><i class="fas fa-user-plus"></i> Registrar</button>
    </div>
    <div id="loginMessage" class="small-text"></div>
  </div>

  <!-- PAINEL PRINCIPAL -->
  <div id="mainPanel" class="hidden">
    <div class="flex-between">
      <div>
        <div class="glitch-title" data-text=">_NEXCOOEE">>_NEXCOOEE</div>
        <div class="sub">// cooee club • indexdb para arquivos</div>
      </div>
      <div>
        <span id="userTypeBadge" class="badge-user"></span>
        <button id="logoutBtn" class="btn" style="margin-left: 1rem;"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">📋 Dashboard</button>
      <button class="tab-btn" data-tab="users">👥 Usuários</button>
      <button class="tab-btn" data-tab="media">🖼️ Mídia (PDF/IMG)</button>
    </div>

    <!-- Dashboard -->
    <div id="tabDashboard" class="tab-content">
      <div id="adminInjectPanel" class="glass-card admin-only" style="margin-bottom: 1.5rem;">
        <div class="section-title"><i class="fas fa-user-secret"></i> <span>INJECT NEW TARGET</span></div>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
          <input type="text" id="fullName" class="input-field" style="flex:1;" placeholder="Nome completo">
          <input type="text" id="personEmail" class="input-field" style="flex:1;" placeholder="E-mail">
          <input type="text" id="personPhone" class="input-field" style="flex:1;" placeholder="Telefone">
          <input type="text" id="personLocation" class="input-field" style="flex:1;" placeholder="Cidade/País">
          <button id="addPersonBtn" class="btn"><i class="fas fa-skull-crosswalk"></i> INJECT</button>
        </div>
        <div id="addStatus" style="font-size:0.8rem; margin-top:1rem;"></div>
      </div>
      <div style="margin: 1rem 0; display: flex; gap: 1rem; flex-wrap: wrap;">
        <input type="text" id="searchInput" class="input-field" style="flex:2;" placeholder="🔍 Buscar por nome, email ou local...">
        <button id="clearSearchBtn" class="btn"><i class="fas fa-times"></i> Limpar</button>
      </div>
      <div id="peopleGrid" class="data-grid"></div>
    </div>

    <!-- Usuários -->
    <div id="tabUsers" class="tab-content hidden">
      <div class="glass-card">
        <div class="section-title"><i class="fas fa-users"></i> <span>Contas cadastradas</span></div>
        <div id="usersList" class="data-grid" style="grid-template-columns: 1fr;"></div>
      </div>
    </div>

    <!-- Mídia com IndexedDB -->
    <div id="tabMedia" class="tab-content hidden">
      <div class="glass-card">
        <div class="section-title"><i class="fas fa-file-alt"></i> <span>Arquivos e Imagens (IndexedDB - suporta arquivos grandes)</span></div>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
          <input type="text" id="mediaName" class="input-field" style="flex:1;" placeholder="Nome do arquivo">
          <label for="mediaFile" class="btn" style="cursor: pointer;"><i class="fas fa-upload"></i> Selecionar arquivo</label>
          <input type="file" id="mediaFile" accept="image/png, image/jpeg, image/jpg, image/gif, application/pdf" style="display: none;">
          <button id="addMediaBtn" class="btn"><i class="fas fa-plus"></i> Adicionar</button>
        </div>
        <div id="mediaList" class="data-grid"></div>
      </div>
    </div>

    <footer><i class="fas fa-terminal"></i> [ NexCooee • IndexedDB para arquivos ]</footer>
  </div>
</div>

<script>
  // ========== SIMPLES LOCALSTORAGE PARA USUÁRIOS E DADOS LEVES ==========
  let usuarios = [];
  let dadosPessoas = [];
  let usuarioLogado = null;

  const ADMIN_PADRAO = {
    id: 'admin_1',
    email: 'admin@nexcooee.com',
    senha: 'admin123',
    tipo: 'admin'
  };

  function inicializarDados() {
    const storedUsers = localStorage.getItem('nexcooee_usuarios');
    if (storedUsers) {
      usuarios = JSON.parse(storedUsers);
    } else {
      usuarios = [ADMIN_PADRAO];
      localStorage.setItem('nexcooee_usuarios', JSON.stringify(usuarios));
    }
    const storedPessoas = localStorage.getItem('nexcooee_dados');
    dadosPessoas = storedPessoas ? JSON.parse(storedPessoas) : [];
  }
  function salvarUsuarios() { localStorage.setItem('nexcooee_usuarios', JSON.stringify(usuarios)); }
  function salvarDados() { localStorage.setItem('nexcooee_dados', JSON.stringify(dadosPessoas)); }

  // ========== AUTENTICAÇÃO ==========
  function registrarUsuario(email, senha) {
    if (usuarios.find(u => u.email === email)) throw new Error('E-mail já registrado.');
    if (!email || !senha) throw new Error('Preencha e-mail e senha.');
    if (senha.length < 4) throw new Error('Senha deve ter no mínimo 4 caracteres.');
    const novo = { id: Date.now().toString(), email, senha, tipo: 'user' };
    usuarios.push(novo);
    salvarUsuarios();
    return novo;
  }
  function loginUsuario(email, senha) {
    const user = usuarios.find(u => u.email === email && u.senha === senha);
    if (!user) throw new Error('E-mail ou senha incorretos.');
    return user;
  }
  function salvarSessao(user) {
    localStorage.setItem('nexcooee_sessao', JSON.stringify({ id: user.id, email: user.email, tipo: user.tipo }));
  }
  function carregarSessao() {
    const sessao = localStorage.getItem('nexcooee_sessao');
    if (sessao) {
      const userData = JSON.parse(sessao);
      return usuarios.find(u => u.id === userData.id) || null;
    }
    return null;
  }
  function encerrarSessao() {
    localStorage.removeItem('nexcooee_sessao');
    usuarioLogado = null;
    location.reload();
  }

  // ========== CRUD PESSOAS ==========
  function adicionarPessoa(nome, email, telefone, local) {
    if (usuarioLogado.tipo !== 'admin') throw new Error('Apenas administradores podem adicionar.');
    if (!nome.trim()) throw new Error('Nome obrigatório.');
    dadosPessoas.unshift({
      id: Date.now(),
      nome: nome.trim(),
      email: email.trim(),
      telefone: telefone.trim(),
      local: local.trim() || 'Desconhecido',
      criadoPor: usuarioLogado.email,
      criadoEm: new Date().toLocaleString()
    });
    salvarDados();
  }
  function removerPessoa(id) {
    if (usuarioLogado.tipo !== 'admin') throw new Error('Permissão negada.');
    const idx = dadosPessoas.findIndex(p => p.id == id);
    if (idx !== -1) { dadosPessoas.splice(idx, 1); salvarDados(); return true; }
    return false;
  }

  // ========== GERENCIAR USUÁRIOS ==========
  async function promoverAdmin(id) {
    const user = usuarios.find(u => u.id === id);
    if (user && user.tipo !== 'admin') { user.tipo = 'admin'; salvarUsuarios(); return true; }
    return false;
  }
  async function rebaixarUser(id) {
    const user = usuarios.find(u => u.id === id);
    if (user && user.tipo === 'admin' && user.email !== 'admin@nexcooee.com') { user.tipo = 'user'; salvarUsuarios(); return true; }
    return false;
  }
  async function excluirUsuario(id) {
    const idx = usuarios.findIndex(u => u.id === id);
    if (idx !== -1 && usuarios[idx].email !== 'admin@nexcooee.com') { usuarios.splice(idx, 1); salvarUsuarios(); return true; }
    return false;
  }

  // ========== INDEXEDDB PARA ARQUIVOS DE MÍDIA ==========
  let db = null;
  let midiasArray = []; // cache local para renderização rápida

  function abrirIndexedDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('NexCooeeDB', 1);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { db = request.result; resolve(db); };
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains('midias')) {
          const store = db.createObjectStore('midias', { keyPath: 'id', autoIncrement: true });
          store.createIndex('nome', 'nome', { unique: false });
          store.createIndex('data', 'data', { unique: false });
        }
      };
    });
  }

  async function carregarMidias() {
    if (!db) await abrirIndexedDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(['midias'], 'readonly');
      const store = transaction.objectStore('midias');
      const request = store.getAll();
      request.onsuccess = () => {
        midiasArray = request.result || [];
        resolve(midiasArray);
      };
      request.onerror = () => reject(request.error);
    });
  }

  async function adicionarMidiaIndexed(nome, file, tipo) {
    if (usuarioLogado.tipo !== 'admin') throw new Error('Apenas administradores podem adicionar mídia.');
    if (!nome.trim()) nome = `Arquivo ${Date.now()}`;
    const reader = new FileReader();
    return new Promise((resolve, reject) => {
      reader.onload = async (ev) => {
        const base64 = ev.target.result;
        const newMidia = {
          id: Date.now(),
          nome: nome.trim(),
          tipo: tipo,
          data: new Date().toLocaleString(),
          base64: base64
        };
        if (!db) await abrirIndexedDB();
        const transaction = db.transaction(['midias'], 'readwrite');
        const store = transaction.objectStore('midias');
        const request = store.add(newMidia);
        request.onsuccess = () => {
          carregarMidias().then(() => renderMidias());
          resolve();
        };
        request.onerror = () => reject(request.error);
      };
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  async function removerMidiaIndexed(id) {
    if (usuarioLogado.tipo !== 'admin') throw new Error('Permissão negada.');
    if (!db) await abrirIndexedDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(['midias'], 'readwrite');
      const store = transaction.objectStore('midias');
      const request = store.delete(id);
      request.onsuccess = () => {
        carregarMidias().then(() => renderMidias());
        resolve();
      };
      request.onerror = () => reject(request.error);
    });
  }

  // ========== RENDERIZAÇÃO ==========
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  function showStatus(msg, isError = false) {
    const el = document.getElementById('addStatus');
    if (el) {
      el.innerText = msg;
      el.style.color = isError ? '#ffa098' : '#8bcb9e';
      setTimeout(() => el.innerText = '', 4000);
    }
    const loginMsg = document.getElementById('loginMessage');
    if (loginMsg && (msg.includes('Conta') || msg.includes('senha'))) {
      loginMsg.innerText = msg;
      loginMsg.style.color = isError ? '#ffa098' : '#a3ffcf';
      setTimeout(() => loginMsg.innerText = '', 4000);
    }
  }

  function renderCards() {
    const grid = document.getElementById('peopleGrid');
    if (!grid) return;
    const term = document.getElementById('searchInput')?.value.toLowerCase() || '';
    let filtrados = [...dadosPessoas];
    if (term) {
      filtrados = filtrados.filter(p =>
        p.nome?.toLowerCase().includes(term) ||
        p.email?.toLowerCase().includes(term) ||
        p.local?.toLowerCase().includes(term) ||
        p.telefone?.includes(term)
      );
    }
    if (filtrados.length === 0) {
      grid.innerHTML = '<div class="empty-msg"><i class="fas fa-user-slash"></i> Nenhum registro encontrado.</div>';
      return;
    }
    grid.innerHTML = filtrados.map(p => `
      <div class="data-card" data-id="${p.id}">
        <div style="display:flex; justify-content:space-between;">
          <span class="card-name">${escapeHtml(p.nome)}</span>
          <span class="badge">#${p.id}</span>
        </div>
        <div class="info-row"><i class="fas fa-envelope"></i> ${escapeHtml(p.email) || '—'}</div>
        <div class="info-row"><i class="fas fa-phone-alt"></i> ${escapeHtml(p.telefone) || '—'}</div>
        <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(p.local) || '—'}</div>
        <div class="badge"><i class="fas fa-clock"></i> ${p.criadoEm}</div>
        ${usuarioLogado.tipo === 'admin' ? `<div class="delete-icon" data-id="${p.id}" data-type="pessoa"><i class="fas fa-trash-alt"></i></div>` : ''}
      </div>
    `).join('');
    attachDeleteEvents();
    attachCardClickEvents();
  }

  function attachDeleteEvents() {
    document.querySelectorAll('.delete-icon[data-type="pessoa"]').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = el.getAttribute('data-id');
        if (confirm('Remover permanentemente?')) {
          try {
            removerPessoa(id);
            renderCards();
            showStatus('✅ Registro removido.');
          } catch (err) { showStatus(`❌ ${err.message}`, true); }
        }
      });
    });
  }

  function attachCardClickEvents() {
    document.querySelectorAll('.data-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.delete-icon')) return;
        const id = card.getAttribute('data-id');
        const p = dadosPessoas.find(d => d.id == id);
        if (p) alert(`🔎 DETALHES\n\nNome: ${p.nome}\nEmail: ${p.email || '—'}\nTelefone: ${p.telefone || '—'}\nLocal: ${p.local || '—'}\nCriado por: ${p.criadoPor}\nEm: ${p.criadoEm}`);
      });
    });
  }

  function renderUsersList() {
    const container = document.getElementById('usersList');
    if (!container) return;
    if (usuarios.length === 0) {
      container.innerHTML = '<div class="empty-msg">Nenhum usuário cadastrado.</div>';
      return;
    }
    container.innerHTML = usuarios.map(u => `
      <div class="user-card" data-id="${u.id}">
        <div><strong>${escapeHtml(u.email)}</strong> <span class="${u.tipo === 'admin' ? 'badge-admin' : 'badge-user'}">${u.tipo === 'admin' ? 'ADMIN' : 'USUÁRIO'}</span></div>
        <div class="small-text">ID: ${u.id}</div>
        <div style="margin-top: 0.5rem;">
          ${u.tipo !== 'admin' ? `<button class="btn" data-action="promote" data-id="${u.id}">⭐ Promover a Admin</button>` : (u.email !== 'admin@nexcooee.com' ? `<button class="btn" data-action="demote" data-id="${u.id}">⬇️ Rebaixar</button>` : '')}
          ${u.email !== 'admin@nexcooee.com' ? `<button class="btn btn-danger" data-action="deleteUser" data-id="${u.id}">🗑️ Excluir conta</button>` : ''}
        </div>
      </div>
    `).join('');
    document.querySelectorAll('[data-action="promote"]').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); await promoverAdmin(btn.getAttribute('data-id')); renderUsersList(); showStatus('Usuário promovido a admin!'); }));
    document.querySelectorAll('[data-action="demote"]').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); await rebaixarUser(btn.getAttribute('data-id')); renderUsersList(); showStatus('Admin rebaixado para usuário.'); }));
    document.querySelectorAll('[data-action="deleteUser"]').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); if (confirm('Excluir conta permanentemente?')) { await excluirUsuario(btn.getAttribute('data-id')); renderUsersList(); } }));
  }

  function renderMidias() {
    const container = document.getElementById('mediaList');
    if (!container) return;
    if (!midiasArray.length) {
      container.innerHTML = '<div class="empty-msg">Nenhum arquivo ou imagem adicionada.</div>';
      return;
    }
    container.innerHTML = midiasArray.map(m => `
      <div class="media-card" data-id="${m.id}">
        <div><strong>${escapeHtml(m.nome)}</strong></div>
        <div class="small-text">Tipo: ${(m.tipo === 'pdf' ? 'PDF' : 'Imagem').toUpperCase()} | Adicionado: ${m.data}</div>
        <div style="margin-top: 0.8rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
          <button class="btn" data-action="viewMedia" data-id="${m.id}"><i class="fas fa-eye"></i> Visualizar</button>
          <button class="btn" data-action="downloadMedia" data-id="${m.id}"><i class="fas fa-download"></i> Baixar</button>
          ${usuarioLogado.tipo === 'admin' ? `<button class="btn btn-danger" data-action="deleteMedia" data-id="${m.id}"><i class="fas fa-trash"></i> Excluir</button>` : ''}
        </div>
      </div>
    `).join('');
    document.querySelectorAll('[data-action="viewMedia"]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const m = midiasArray.find(m => m.id == btn.getAttribute('data-id')); if (m && m.base64) { if (m.tipo === 'pdf') window.open(m.base64, '_blank'); else { const w = window.open(''); w.document.write(`<img src="${m.base64}" style="max-width:100%">`); } } }));
    document.querySelectorAll('[data-action="downloadMedia"]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const m = midiasArray.find(m => m.id == btn.getAttribute('data-id')); if (m && m.base64) { const a = document.createElement('a'); a.href = m.base64; a.download = m.nome + (m.tipo === 'pdf' ? '.pdf' : '.png'); a.click(); } }));
    document.querySelectorAll('[data-action="deleteMedia"]').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); if (confirm('Excluir este arquivo?')) { try { await removerMidiaIndexed(btn.getAttribute('data-id')); showStatus('Arquivo removido.'); } catch (err) { showStatus(`❌ ${err.message}`, true); } } }));
  }

  // ========== INICIALIZAR INTERFACE APÓS LOGIN ==========
  async function inicializarInterface() {
    const isAdmin = usuarioLogado.tipo === 'admin';
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainPanel').classList.remove('hidden');
    document.getElementById('userTypeBadge').innerHTML = isAdmin ? '<i class="fas fa-crown"></i> ADMINISTRADOR' : '<i class="fas fa-user"></i> USUÁRIO COMUM';
    document.getElementById('userTypeBadge').className = isAdmin ? 'badge-admin' : 'badge-user';
    document.querySelectorAll('.admin-only').forEach(el => isAdmin ? el.classList.remove('hidden') : el.classList.add('hidden'));
    renderCards();
    renderUsersList();
    await carregarMidias();
    renderMidias();
  }

  // ========== EVENTOS ==========
  document.getElementById('registerBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const senha = document.getElementById('loginPassword').value;
    try {
      const novo = await registrarUsuario(email, senha);
      usuarioLogado = novo;
      salvarSessao(usuarioLogado);
      await inicializarInterface();
    } catch (err) { showStatus(`❌ ${err.message}`, true); }
  };

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const senha = document.getElementById('loginPassword').value;
    try {
      const user = await loginUsuario(email, senha);
      usuarioLogado = user;
      salvarSessao(usuarioLogado);
      await inicializarInterface();
    } catch (err) { showStatus(`❌ ${err.message}`, true); }
  };

  document.getElementById('logoutBtn').onclick = () => { encerrarSessao(); };

  document.getElementById('addPersonBtn')?.addEventListener('click', async () => {
    try {
      await adicionarPessoa(
        document.getElementById('fullName').value,
        document.getElementById('personEmail').value,
        document.getElementById('personPhone').value,
        document.getElementById('personLocation').value
      );
      renderCards();
      showStatus('✅ Pessoa adicionada.');
      document.getElementById('fullName').value = '';
      document.getElementById('personEmail').value = '';
      document.getElementById('personPhone').value = '';
      document.getElementById('personLocation').value = '';
    } catch (err) { showStatus(`❌ ${err.message}`, true); }
  });

  document.getElementById('searchInput').addEventListener('input', () => renderCards());
  document.getElementById('clearSearchBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    renderCards();
  });

  document.getElementById('addMediaBtn')?.addEventListener('click', async () => {
    const nome = document.getElementById('mediaName').value;
    const file = document.getElementById('mediaFile').files[0];
    if (!file) { showStatus('❌ Selecione um arquivo.', true); return; }
    if (!nome.trim()) { showStatus('❌ Informe um nome para o arquivo.', true); return; }
    let tipo = 'desconhecido';
    if (file.type === 'application/pdf') tipo = 'pdf';
    else if (file.type.startsWith('image/')) tipo = 'imagem';
    try {
      await adicionarMidiaIndexed(nome, file, tipo);
      showStatus('✅ Arquivo adicionado com sucesso!');
      document.getElementById('mediaName').value = '';
      document.getElementById('mediaFile').value = '';
    } catch (err) { showStatus(`❌ ${err.message}`, true); }
  });

  function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.getAttribute('data-tab');
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');
        if (tab === 'users') renderUsersList();
        if (tab === 'media') renderMidias();
        if (tab === 'dashboard') renderCards();
      });
    });
  }

  // Fundo hacker rain (mesmo)
  function initRain() {
    const bg = document.getElementById('matrixBg');
    if (!bg) return;
    bg.innerHTML = '';
    const chars = '01アイウエオカキクケコサシスソタチツテトナニヌネノハヒフヘホマミムメモヤユヨ';
    for (let i = 0; i < 60; i++) {
      const rain = document.createElement('div');
      rain.className = 'rain';
      let txt = '';
      for (let j = 0; j < 20; j++) txt += chars[Math.floor(Math.random() * chars.length)];
      rain.textContent = txt;
      rain.style.left = Math.random() * 100 + '%';
      rain.style.fontSize = (Math.random() * 18 + 10) + 'px';
      rain.style.animationDuration = (Math.random() * 5 + 2) + 's';
      rain.style.animationDelay = Math.random() * 10 + 's';
      bg.appendChild(rain);
    }
  }
  initRain();
  setInterval(() => {
    const bg = document.getElementById('matrixBg');
    if (bg && bg.children.length) {
      const chars = '01アイウエオカキクケコサシスソ';
      for (let i = 0; i < 3; i++) {
        const r = bg.children[Math.floor(Math.random() * bg.children.length)];
        if (r) {
          let nt = '';
          for (let j = 0; j < r.textContent.length; j++) nt += chars[Math.floor(Math.random() * chars.length)];
          r.textContent = nt;
        }
      }
    }
  }, 1500);

  // Inicialização principal
  inicializarDados();
  initTabs();
  const sessao = carregarSessao();
  if (sessao) {
    usuarioLogado = sessao;
    inicializarInterface().catch(console.error);
  }
</script>
</body>
</html>
